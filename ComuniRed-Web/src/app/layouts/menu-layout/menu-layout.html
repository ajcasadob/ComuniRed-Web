<div class="d-flex flex-column vh-100 position-fixed p-3 sidebar-nav" style="width: 270px">
    <div>
        <!-- Logo / Brand -->
        <div class="d-flex align-items-center px-2 mb-4 mt-1">
            <div class="d-flex align-items-center justify-content-center rounded-3 me-3"
                 style="width:38px; height:38px; background: rgba(255,255,255,0.15);">
                <i class="bi bi-buildings fs-5 text-white"></i>
            </div>
            <div>
                <div class="fw-bold text-white" style="font-size: 1rem; letter-spacing: 0.02em;">ComuniRed</div>
                <small style="color: rgba(255,255,255,0.5); font-size: 0.72rem;">Administración</small>
            </div>
        </div>

        <!-- Separador -->
        <hr style="border-color: rgba(255,255,255,0.12); margin: 0 4px 12px;">

        <nav class="nav flex-column">
            <a routerLink="/panel de control" class="nav-link" routerLinkActive="active">
                <i class="bi bi-grid me-2"></i>Panel de Control
            </a>
            <a routerLink="/reservas-admin" class="nav-link" routerLinkActive="active">
                <i class="bi bi-calendar-event me-2"></i>Reservas
            </a>
            <a routerLink="/incidencias" class="nav-link" routerLinkActive="active">
                <i class="bi bi-exclamation-circle me-2"></i>Incidencias
            </a>
            <a routerLink="/comunicaciones" class="nav-link" routerLinkActive="active">
                <i class="bi bi-megaphone me-2"></i>Comunicaciones
            </a>
            <a routerLink="/pagos-admin" class="nav-link" routerLinkActive="active">
                <i class="bi bi-credit-card me-2"></i>Pagos
            </a>
            <a routerLink="/usuarios" class="nav-link" routerLinkActive="active">
                <i class="bi bi-people me-2"></i>Usuarios
            </a>
            <a routerLink="/viviendas" class="nav-link" routerLinkActive="active">
                <i class="bi bi-house me-2"></i>Viviendas
            </a>
        </nav>
    </div>

    <!-- Botón de cerrar sesión -->
    <div class="mt-auto">
        <hr style="border-color: rgba(255,255,255,0.12); margin: 0 4px 12px;">
        <button (click)="cerrarSesion()" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
            <i class="bi bi-box-arrow-right me-2"></i>
            Cerrar Sesión
        </button>
    </div>
</div>
